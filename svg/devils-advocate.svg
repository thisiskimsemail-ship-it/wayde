<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#ED3694"/>
  <text x="16" y="26" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="3">TEST</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Devil's Advocate</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- The Idea -->
  <rect x="16" y="56" width="768" height="64" fill="#1F2E4D" rx="4" stroke="#ED3694" stroke-width="1"/>
  <text x="40" y="80" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="2">THE IDEA</text>
  <text x="40" y="104" fill="#FFFFFF" font-size="13">Launch a freemium tier to drive adoption, converting 5% of free users to paid within 6 months.</text>

  <!-- Objection 1 -->
  <rect x="16" y="136" width="768" height="104" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="160" fill="#ED3694" font-size="12" font-weight="700">OBJECTION 1</text>
  <text x="688" y="160" fill="#6B7A8E" font-size="10">STRENGTH</text>
  <circle cx="736" cy="156" r="4" fill="#ED3694"/>
  <circle cx="752" cy="156" r="4" fill="#ED3694"/>
  <circle cx="768" cy="156" r="4" fill="#ED3694"/>
  <text x="40" y="184" fill="#C8CED8" font-size="12">Free users will consume server resources without converting, increasing burn rate.</text>
  <text x="40" y="208" fill="#6B7A8E" font-size="10" letter-spacing="1">REBUTTAL</text>
  <text x="40" y="228" fill="#C8CED8" font-size="12">Cap free tier to 100 records. Infrastructure cost per free user stays under $0.50/mo.</text>

  <!-- Objection 2 -->
  <rect x="16" y="248" width="768" height="104" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="272" fill="#ED3694" font-size="12" font-weight="700">OBJECTION 2</text>
  <text x="688" y="272" fill="#6B7A8E" font-size="10">STRENGTH</text>
  <circle cx="736" cy="268" r="4" fill="#ED3694"/>
  <circle cx="752" cy="268" r="4" fill="#ED3694"/>
  <circle cx="768" cy="268" r="4" fill="none" stroke="#ED3694" stroke-width="1"/>
  <text x="40" y="296" fill="#C8CED8" font-size="12">Existing paying customers may downgrade when they see how much is free.</text>
  <text x="40" y="320" fill="#6B7A8E" font-size="10" letter-spacing="1">REBUTTAL</text>
  <text x="40" y="340" fill="#C8CED8" font-size="12">Paid tier includes team features and integrations free users can't access. Clear value gap.</text>

  <!-- Objection 3 -->
  <rect x="16" y="360" width="768" height="104" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="384" fill="#ED3694" font-size="12" font-weight="700">OBJECTION 3</text>
  <text x="688" y="384" fill="#6B7A8E" font-size="10">STRENGTH</text>
  <circle cx="736" cy="380" r="4" fill="#ED3694"/>
  <circle cx="752" cy="380" r="4" fill="#ED3694"/>
  <circle cx="768" cy="380" r="4" fill="#ED3694"/>
  <text x="40" y="408" fill="#C8CED8" font-size="12">5% conversion rate is optimistic for B2B SaaS freemium. Industry average is 2-3%.</text>
  <text x="40" y="432" fill="#6B7A8E" font-size="10" letter-spacing="1">REBUTTAL</text>
  <text x="40" y="452" fill="#C8CED8" font-size="12">Model break-even at 2% conversion. 5% is stretch target, not viability threshold.</text>

  <!-- Objection 4 -->
  <rect x="16" y="472" width="768" height="96" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="496" fill="#ED3694" font-size="12" font-weight="700">OBJECTION 4</text>
  <text x="688" y="496" fill="#6B7A8E" font-size="10">STRENGTH</text>
  <circle cx="736" cy="492" r="4" fill="#ED3694"/>
  <circle cx="752" cy="492" r="4" fill="none" stroke="#ED3694" stroke-width="1"/>
  <circle cx="768" cy="492" r="4" fill="none" stroke="#ED3694" stroke-width="1"/>
  <text x="40" y="520" fill="#C8CED8" font-size="12">Support burden from free users will overwhelm the small CS team.</text>
  <text x="40" y="544" fill="#6B7A8E" font-size="10" letter-spacing="1">REBUTTAL</text>
  <text x="40" y="560" fill="#C8CED8" font-size="12">Free tier is self-serve only with community forum. No human support included.</text>

  <!-- Verdict -->
  <rect x="16" y="584" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <rect x="16" y="584" width="768" height="2" fill="#ED3694"/>
  <text x="40" y="616" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="2">VERDICT</text>
  <text x="152" y="616" fill="#FFFFFF" font-size="13" font-weight="700">SURVIVES WITH CONDITIONS</text>
  <text x="40" y="648" fill="#C8CED8" font-size="12">Viable if: break-even modelled at 2%, free tier has hard usage caps, no human support included.</text>
</svg>