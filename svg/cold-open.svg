<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <style>
      .bg { fill: #1B2A4A; }
      .card { fill: #1F2E4D; stroke: #2A3656; stroke-width: 1; }
      .card-pink { fill: #1F2E4D; stroke: #ED3694; stroke-width: 1.5; }
      .title { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .subtitle { fill: #ED3694; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
      .body { fill: #8B9DC3; font-family: Arial, sans-serif; font-size: 12px; }
      .body-white { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 12px; }
      .landed { fill: #4ADE80; font-family: Arial, sans-serif; font-size: 11px; }
      .lost { fill: #F87171; font-family: Arial, sans-serif; font-size: 11px; }
      .version-label { fill: #ED3694; font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
      .hierarchy-title { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .level-label { fill: #ED3694; font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
      .level-text { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 13px; }
      .section-label { fill: #6B7FA3; font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; letter-spacing: 1.5px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="650" rx="0"/>

  <!-- Section label: ITERATIONS -->
  <text class="section-label" x="30" y="30">ITERATION RECORD</text>

  <!-- V1 Card -->
  <rect class="card" x="20" y="42" width="360" height="150" rx="8"/>
  <text class="version-label" x="36" y="66">V1</text>
  <text class="body-white" x="36" y="86">"We build AI-powered customer success</text>
  <text class="body-white" x="36" y="102">platforms with predictive analytics..."</text>
  <text class="landed" x="36" y="128">What landed: "customer success" got attention</text>
  <text class="lost" x="36" y="148">Where I lost you: "predictive analytics" — eyes glazed</text>
  <text class="lost" x="36" y="164">Too many features, no clear outcome</text>

  <!-- V2 Card -->
  <rect class="card" x="20" y="204" width="360" height="150" rx="8"/>
  <text class="version-label" x="36" y="228">V2</text>
  <text class="body-white" x="36" y="248">"We stop enterprise customers from</text>
  <text class="body-white" x="36" y="264">churning in the first 90 days."</text>
  <text class="landed" x="36" y="290">What landed: "first 90 days" — specific and urgent</text>
  <text class="landed" x="36" y="306">The problem is clear now</text>
  <text class="lost" x="36" y="326">Still two ideas competing — churn + onboarding</text>

  <!-- V3 Card -->
  <rect class="card" x="20" y="366" width="360" height="150" rx="8"/>
  <text class="version-label" x="36" y="390">V3</text>
  <text class="body-white" x="36" y="410">"We make it impossible to lose a customer</text>
  <text class="body-white" x="36" y="426">in the first 90 days."</text>
  <text class="landed" x="36" y="452">What landed: One hook. Led with the outcome.</text>
  <text class="landed" x="36" y="468">"Tell me more" — the right reaction</text>
  <text class="landed" x="36" y="488">Energy shifted. This is the one.</text>

  <!-- Section label: MESSAGE HIERARCHY -->
  <text class="section-label" x="420" y="30">MESSAGE HIERARCHY</text>

  <!-- Hook (Level 1) — largest, pink border -->
  <rect class="card-pink" x="410" y="42" width="370" height="130" rx="8"/>
  <text class="level-label" x="426" y="66">LEVEL 1 — THE HOOK</text>
  <text class="level-text" x="426" y="92">We make it impossible for</text>
  <text class="level-text" x="426" y="110">enterprise teams to lose a customer</text>
  <text class="level-text" x="426" y="128">in the first 90 days.</text>
  <line x1="426" y1="142" x2="764" y2="142" stroke="#ED3694" stroke-width="1" opacity="0.3"/>
  <text class="body" x="426" y="158">The dinner party sentence</text>

  <!-- Follow-up (Level 2) -->
  <rect class="card" x="410" y="190" width="370" height="120" rx="8"/>
  <rect x="410" y="190" width="4" height="120" rx="2" fill="#ED3694" opacity="0.6"/>
  <text class="level-label" x="430" y="214">LEVEL 2 — THE FOLLOW-UP</text>
  <text class="level-text" x="430" y="240">Most churn happens because</text>
  <text class="level-text" x="430" y="258">onboarding is broken. We fix the</text>
  <text class="level-text" x="430" y="276">first 90 days.</text>
  <text class="body" x="430" y="298">Problem + insight</text>

  <!-- Detail (Level 3) -->
  <rect class="card" x="410" y="328" width="370" height="130" rx="8"/>
  <rect x="410" y="328" width="4" height="130" rx="2" fill="#ED3694" opacity="0.3"/>
  <text class="level-label" x="430" y="352">LEVEL 3 — THE DETAIL</text>
  <text class="level-text" x="430" y="378">AI-powered onboarding workflows</text>
  <text class="level-text" x="430" y="396">that adapt to each customer's</text>
  <text class="level-text" x="430" y="414">behaviour. 40% reduction in churn</text>
  <text class="level-text" x="430" y="432">for enterprise SaaS.</text>
  <text class="body" x="430" y="450">Features + proof points</text>

  <!-- Arrow indicators connecting hierarchy levels -->
  <path d="M 595 172 L 595 188" stroke="#ED3694" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 595 312 L 595 326" stroke="#ED3694" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ED3694"/>
    </marker>
  </defs>

  <!-- Bottom context bar -->
  <rect class="card" x="20" y="540" width="760" height="90" rx="8"/>
  <text class="subtitle" x="36" y="564">CONTEXT ADAPTATIONS</text>
  <text class="body" x="36" y="586">Homepage: Lead with the hook. One sentence above the fold.</text>
  <text class="body" x="36" y="604">Pitch deck: Hook on slide 1. Follow-up on slide 2. Detail in appendix.</text>
  <text class="body" x="36" y="622">Email: Hook as subject line. Follow-up as first paragraph. Detail as CTA link.</text>

</svg>
