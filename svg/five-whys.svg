<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#27BDBE"/>
  <text x="16" y="26" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="3">UNTANGLE</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Five Whys</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="16" y="56" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="80" fill="#27BDBE" font-size="14" font-weight="700">1</text>
  <text x="64" y="80" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="2">WHY</text>
  <text x="64" y="104" fill="#C8CED8" font-size="13">Why are customers cancelling after the first month?</text>
  <line x1="40" y1="136" x2="40" y2="152" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 2 -->
  <rect x="16" y="152" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="176" fill="#27BDBE" font-size="14" font-weight="700">2</text>
  <text x="64" y="176" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="2">WHY</text>
  <text x="64" y="200" fill="#C8CED8" font-size="13">They don't see value in the product quickly enough.</text>
  <line x1="40" y1="232" x2="40" y2="248" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 3 -->
  <rect x="16" y="248" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="272" fill="#27BDBE" font-size="14" font-weight="700">3</text>
  <text x="64" y="272" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="2">WHY</text>
  <text x="64" y="296" fill="#C8CED8" font-size="13">Onboarding doesn't connect features to their specific goals.</text>
  <line x1="40" y1="328" x2="40" y2="344" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 4 -->
  <rect x="16" y="344" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="368" fill="#27BDBE" font-size="14" font-weight="700">4</text>
  <text x="64" y="368" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="2">WHY</text>
  <text x="64" y="392" fill="#C8CED8" font-size="13">We use one-size-fits-all onboarding for every segment.</text>
  <line x1="40" y1="424" x2="40" y2="440" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 5 -->
  <rect x="16" y="440" width="768" height="80" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="464" fill="#27BDBE" font-size="14" font-weight="700">5</text>
  <text x="64" y="464" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="2">WHY</text>
  <text x="64" y="488" fill="#C8CED8" font-size="13">We never researched how different segments define success.</text>

  <!-- Arrow to root cause -->
  <line x1="400" y1="528" x2="400" y2="560" stroke="#27BDBE" stroke-width="1.5"/>
  <polygon points="394,556 400,568 406,556" fill="#27BDBE"/>

  <!-- Root Cause -->
  <rect x="16" y="576" width="768" height="96" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <rect x="16" y="576" width="768" height="2" fill="#27BDBE"/>
  <text x="400" y="608" fill="#27BDBE" font-size="11" font-weight="600" letter-spacing="3" text-anchor="middle">ROOT CAUSE</text>
  <text x="400" y="640" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">We lack segment-specific understanding of what "value" means to each customer type.</text>
</svg>