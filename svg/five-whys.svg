<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="56" fill="#1F2E4D" rx="8"/>
  <rect x="0" y="48" width="800" height="8" fill="#1F2E4D"/>
  <rect x="0" y="0" width="3" height="56" fill="#27BDBE"/>
  <text x="24" y="36" fill="#27BDBE" font-size="13" font-weight="bold" letter-spacing="2">THE UNTANGLE</text>
  <text x="180" y="36" fill="#FFFFFF" font-size="18" font-weight="bold">FIVE WHYS</text>

  <!-- Step 1 -->
  <circle cx="60" cy="110" r="18" fill="none" stroke="#27BDBE" stroke-width="2"/>
  <text x="60" y="115" fill="#27BDBE" font-size="14" font-weight="bold" text-anchor="middle">1</text>
  <line x1="60" y1="128" x2="60" y2="190" stroke="#2A3656" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="100" y="86" width="660" height="48" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <text x="116" y="106" fill="#27BDBE" font-size="11" font-weight="bold" letter-spacing="1">WHY?</text>
  <text x="116" y="124" fill="#B8BCC8" font-size="13">Why are customers cancelling after the first month?</text>

  <!-- Step 2 -->
  <circle cx="60" cy="210" r="18" fill="none" stroke="#27BDBE" stroke-width="2"/>
  <text x="60" y="215" fill="#27BDBE" font-size="14" font-weight="bold" text-anchor="middle">2</text>
  <line x1="60" y1="228" x2="60" y2="290" stroke="#2A3656" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="100" y="186" width="660" height="48" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <text x="116" y="206" fill="#27BDBE" font-size="11" font-weight="bold" letter-spacing="1">WHY?</text>
  <text x="116" y="224" fill="#B8BCC8" font-size="13">Because they don't see value in the product quickly enough</text>

  <!-- Step 3 -->
  <circle cx="60" cy="310" r="18" fill="none" stroke="#27BDBE" stroke-width="2"/>
  <text x="60" y="315" fill="#27BDBE" font-size="14" font-weight="bold" text-anchor="middle">3</text>
  <line x1="60" y1="328" x2="60" y2="390" stroke="#2A3656" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="100" y="286" width="660" height="48" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <text x="116" y="306" fill="#27BDBE" font-size="11" font-weight="bold" letter-spacing="1">WHY?</text>
  <text x="116" y="324" fill="#B8BCC8" font-size="13">Because onboarding doesn't connect features to their specific goals</text>

  <!-- Step 4 -->
  <circle cx="60" cy="410" r="18" fill="none" stroke="#27BDBE" stroke-width="2"/>
  <text x="60" y="415" fill="#27BDBE" font-size="14" font-weight="bold" text-anchor="middle">4</text>
  <line x1="60" y1="428" x2="60" y2="490" stroke="#2A3656" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="100" y="386" width="660" height="48" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <text x="116" y="406" fill="#27BDBE" font-size="11" font-weight="bold" letter-spacing="1">WHY?</text>
  <text x="116" y="424" fill="#B8BCC8" font-size="13">Because we use a one-size-fits-all onboarding flow for all segments</text>

  <!-- Step 5 -->
  <circle cx="60" cy="510" r="18" fill="none" stroke="#27BDBE" stroke-width="2"/>
  <text x="60" y="515" fill="#27BDBE" font-size="14" font-weight="bold" text-anchor="middle">5</text>
  <line x1="60" y1="528" x2="60" y2="570" stroke="#2A3656" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="100" y="486" width="660" height="48" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <text x="116" y="506" fill="#27BDBE" font-size="11" font-weight="bold" letter-spacing="1">WHY?</text>
  <text x="116" y="524" fill="#B8BCC8" font-size="13">Because we never researched how different segments define success</text>

  <!-- Arrow down to root cause -->
  <line x1="60" y1="570" x2="60" y2="590" stroke="#27BDBE" stroke-width="2"/>
  <polygon points="52,588 60,600 68,588" fill="#27BDBE"/>

  <!-- Root Cause box -->
  <rect x="30" y="608" width="740" height="68" fill="#1F2E4D" rx="8" stroke="#2A3656" stroke-width="1"/>
  <rect x="30" y="608" width="740" height="3" fill="#27BDBE" rx="1"/>
  <text x="400" y="636" fill="#27BDBE" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">ROOT CAUSE</text>
  <text x="400" y="660" fill="#FFFFFF" font-size="14" font-weight="bold" text-anchor="middle">We lack segment-specific understanding of what "value" means to each customer type</text>
</svg>