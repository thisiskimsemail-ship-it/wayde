<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#E4E517"/>
  <text x="16" y="26" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="3">BUILD</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Lean Canvas</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Grid: 5 columns, 2 main rows + bottom row -->
  <!-- Col 1: PROBLEM (spans rows 1-2) -->
  <rect x="16" y="56" width="152" height="264" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="32" y="76" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">PROBLEM</text>
  <text x="32" y="100" fill="#C8CED8" font-size="11">1. Users abandon</text>
  <text x="32" y="116" fill="#C8CED8" font-size="11">onboarding early</text>
  <text x="32" y="140" fill="#C8CED8" font-size="11">2. No clear path from</text>
  <text x="32" y="156" fill="#C8CED8" font-size="11">sign-up to value</text>
  <text x="32" y="180" fill="#C8CED8" font-size="11">3. Complexity kills</text>
  <text x="32" y="196" fill="#C8CED8" font-size="11">first impressions</text>
  <line x1="32" y1="216" x2="152" y2="216" stroke="#2A3656" stroke-width="0.5"/>
  <text x="32" y="236" fill="#6B7A8E" font-size="10">EXISTING ALTERNATIVES</text>
  <text x="32" y="256" fill="#C8CED8" font-size="11">Tutorial videos,</text>
  <text x="32" y="272" fill="#C8CED8" font-size="11">documentation, webinars</text>

  <!-- Col 2 Row 1: SOLUTION -->
  <rect x="176" y="56" width="152" height="128" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="192" y="76" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">SOLUTION</text>
  <text x="192" y="100" fill="#C8CED8" font-size="11">AI-guided onboarding</text>
  <text x="192" y="116" fill="#C8CED8" font-size="11">that adapts to user</text>
  <text x="192" y="132" fill="#C8CED8" font-size="11">behaviour and goals</text>
  <text x="192" y="156" fill="#C8CED8" font-size="11">Pre-built templates</text>
  <text x="192" y="172" fill="#C8CED8" font-size="11">for instant start</text>

  <!-- Col 2 Row 2: KEY METRICS -->
  <rect x="176" y="192" width="152" height="128" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="192" y="212" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">KEY METRICS</text>
  <text x="192" y="236" fill="#C8CED8" font-size="11">Activation rate (Day 1)</text>
  <text x="192" y="256" fill="#C8CED8" font-size="11">Time to first value</text>
  <text x="192" y="276" fill="#C8CED8" font-size="11">30-day retention</text>
  <text x="192" y="296" fill="#C8CED8" font-size="11">NPS at week 2</text>

  <!-- Col 3: UVP (spans rows 1-2) -->
  <rect x="336" y="56" width="152" height="264" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="352" y="76" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">UNIQUE VALUE PROP</text>
  <text x="352" y="104" fill="#FFFFFF" font-size="12" font-weight="700">Get your first win in</text>
  <text x="352" y="120" fill="#FFFFFF" font-size="12" font-weight="700">5 minutes, not 5 days</text>
  <line x1="352" y1="140" x2="472" y2="140" stroke="#2A3656" stroke-width="0.5"/>
  <text x="352" y="160" fill="#6B7A8E" font-size="10">HIGH-LEVEL CONCEPT</text>
  <text x="352" y="180" fill="#C8CED8" font-size="11">"Duolingo for SaaS</text>
  <text x="352" y="196" fill="#C8CED8" font-size="11">onboarding"</text>

  <!-- Col 4 Row 1: UNFAIR ADVANTAGE -->
  <rect x="496" y="56" width="152" height="128" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="512" y="76" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">UNFAIR ADVANTAGE</text>
  <text x="512" y="100" fill="#C8CED8" font-size="11">Proprietary dataset of</text>
  <text x="512" y="116" fill="#C8CED8" font-size="11">10K+ onboarding flows</text>
  <text x="512" y="140" fill="#C8CED8" font-size="11">Team from top SaaS</text>
  <text x="512" y="156" fill="#C8CED8" font-size="11">growth organisations</text>

  <!-- Col 4 Row 2: CHANNELS -->
  <rect x="496" y="192" width="152" height="128" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="512" y="212" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">CHANNELS</text>
  <text x="512" y="236" fill="#C8CED8" font-size="11">Product-led growth</text>
  <text x="512" y="256" fill="#C8CED8" font-size="11">Content marketing</text>
  <text x="512" y="276" fill="#C8CED8" font-size="11">SaaS founder communities</text>
  <text x="512" y="296" fill="#C8CED8" font-size="11">Integration partners</text>

  <!-- Col 5: CUSTOMER SEGMENTS (spans rows 1-2) -->
  <rect x="656" y="56" width="128" height="264" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="672" y="76" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">CUSTOMER SEGMENTS</text>
  <text x="672" y="104" fill="#C8CED8" font-size="11">B2B SaaS founders</text>
  <text x="672" y="120" fill="#C8CED8" font-size="11">(Series A, 10-50</text>
  <text x="672" y="136" fill="#C8CED8" font-size="11">employees)</text>
  <line x1="672" y1="156" x2="768" y2="156" stroke="#2A3656" stroke-width="0.5"/>
  <text x="672" y="176" fill="#6B7A8E" font-size="10">EARLY ADOPTERS</text>
  <text x="672" y="196" fill="#C8CED8" font-size="11">Product-led growth</text>
  <text x="672" y="212" fill="#C8CED8" font-size="11">teams with 1000+</text>
  <text x="672" y="228" fill="#C8CED8" font-size="11">monthly sign-ups</text>

  <!-- Row 3: Cost Structure + Revenue Streams -->
  <rect x="16" y="336" width="376" height="104" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="32" y="360" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">COST STRUCTURE</text>
  <text x="32" y="384" fill="#C8CED8" font-size="11">AI/ML infrastructure (40% of costs)</text>
  <text x="32" y="404" fill="#C8CED8" font-size="11">Engineering team (3 FTEs)</text>
  <text x="32" y="424" fill="#C8CED8" font-size="11">Customer success + content creation</text>

  <rect x="408" y="336" width="376" height="104" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="424" y="360" fill="#E4E517" font-size="10" font-weight="600" letter-spacing="2">REVENUE STREAMS</text>
  <text x="424" y="384" fill="#C8CED8" font-size="11">SaaS: $199/mo (Growth) | $499/mo (Scale) | Enterprise custom</text>
  <text x="424" y="404" fill="#C8CED8" font-size="11">Usage-based: per active user beyond plan limits</text>
  <text x="424" y="424" fill="#C8CED8" font-size="11">Professional services: custom onboarding flow design</text>

  <!-- Riskiest Assumption -->
  <rect x="16" y="456" width="768" height="64" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <rect x="16" y="456" width="768" height="2" fill="#E4E517"/>
  <text x="40" y="480" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">RISKIEST ASSUMPTION</text>
  <text x="40" y="508" fill="#FFFFFF" font-size="13" font-weight="700">B2B SaaS founders will pay for an onboarding tool rather than building custom flows in-house.</text>
</svg>