<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#ED3694"/>
  <text x="16" y="26" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="3">TEST</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Reality Check</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Column headers -->
  <text x="208" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">THE STORY</text>
  <text x="536" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">THE EVIDENCE</text>
  <text x="744" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">RATING</text>
  <line x1="16" y1="80" x2="784" y2="80" stroke="#2A3656" stroke-width="1"/>

  <!-- Row 1: Supported -->
  <rect x="16" y="88" width="360" height="72" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="112" fill="#6B7A8E" font-size="10" font-weight="600">CLAIM</text>
  <text x="40" y="132" fill="#FFFFFF" font-size="12">"We have strong product-market fit</text>
  <text x="40" y="148" fill="#FFFFFF" font-size="12">in the SMB segment."</text>

  <rect x="392" y="88" width="280" height="72" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1"/>
  <text x="416" y="112" fill="#6B7A8E" font-size="10" font-weight="600">EVIDENCE</text>
  <text x="416" y="132" fill="#C8CED8" font-size="12">NPS 62, 78% monthly retention,</text>
  <text x="416" y="148" fill="#C8CED8" font-size="12">85% of revenue from SMB.</text>

  <text x="744" y="132" fill="#ED3694" font-size="10" font-weight="600" text-anchor="middle">SUPPORTED</text>

  <!-- Row 2: Partial -->
  <rect x="16" y="176" width="360" height="72" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="200" fill="#6B7A8E" font-size="10" font-weight="600">CLAIM</text>
  <text x="40" y="224" fill="#FFFFFF" font-size="12">"Growth is accelerating."</text>

  <rect x="392" y="176" width="280" height="72" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1" stroke-opacity="0.5"/>
  <text x="416" y="200" fill="#6B7A8E" font-size="10" font-weight="600">EVIDENCE</text>
  <text x="416" y="224" fill="#C8CED8" font-size="12">MRR up 8% MoM but churn rose</text>
  <text x="416" y="240" fill="#C8CED8" font-size="12">from 4% to 7%. Net growth flat.</text>

  <text x="744" y="220" fill="#ED3694" font-size="10" font-weight="600" text-anchor="middle" opacity="0.6">PARTIAL</text>

  <!-- Row 3: Unsupported -->
  <rect x="16" y="264" width="360" height="72" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="288" fill="#6B7A8E" font-size="10" font-weight="600">CLAIM</text>
  <text x="40" y="312" fill="#FFFFFF" font-size="12">"The team is strong and aligned."</text>

  <rect x="392" y="264" width="280" height="72" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1" stroke-opacity="0.3"/>
  <text x="416" y="288" fill="#6B7A8E" font-size="10" font-weight="600">EVIDENCE</text>
  <text x="416" y="312" fill="#C8CED8" font-size="12">No 1:1s in 3 months. 2 of 6 engineers</text>
  <text x="416" y="328" fill="#C8CED8" font-size="12">actively interviewing elsewhere.</text>

  <text x="744" y="308" fill="#ED3694" font-size="10" font-weight="600" text-anchor="middle" opacity="0.3">UNSUPPORTED</text>

  <!-- Row 4: Unsupported -->
  <rect x="16" y="352" width="360" height="72" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="376" fill="#6B7A8E" font-size="10" font-weight="600">CLAIM</text>
  <text x="40" y="400" fill="#FFFFFF" font-size="12">"We'll be profitable by Q3."</text>

  <rect x="392" y="352" width="280" height="72" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1" stroke-opacity="0.3"/>
  <text x="416" y="376" fill="#6B7A8E" font-size="10" font-weight="600">EVIDENCE</text>
  <text x="416" y="400" fill="#C8CED8" font-size="12">Burn rate $85K/mo. Revenue $22K/mo.</text>
  <text x="416" y="416" fill="#C8CED8" font-size="12">No model shows path to Q3 breakeven.</text>

  <text x="744" y="396" fill="#ED3694" font-size="10" font-weight="600" text-anchor="middle" opacity="0.3">UNSUPPORTED</text>

  <!-- Separator -->
  <line x1="16" y1="440" x2="784" y2="440" stroke="#ED3694" stroke-width="1.5"/>

  <!-- Revised Narrative -->
  <text x="40" y="468" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="2">REVISED NARRATIVE</text>
  <rect x="16" y="480" width="768" height="88" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="504" fill="#FFFFFF" font-size="13">"We have genuine product-market fit in SMB, but growth is masking a churn</text>
  <text x="40" y="524" fill="#FFFFFF" font-size="13">problem. The team needs attention before we can scale. Profitability timeline</text>
  <text x="40" y="544" fill="#FFFFFF" font-size="13">needs a realistic reset based on current unit economics."</text>

  <!-- 3 Key Metrics -->
  <text x="40" y="592" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="2">3 KEY METRICS</text>

  <rect x="16" y="608" width="248" height="56" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1"/>
  <text x="140" y="632" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Net Revenue Retention</text>
  <text x="140" y="652" fill="#6B7A8E" font-size="10" text-anchor="middle">Target: >100%</text>

  <rect x="280" y="608" width="248" height="56" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1"/>
  <text x="404" y="632" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Monthly Burn Multiple</text>
  <text x="404" y="652" fill="#6B7A8E" font-size="10" text-anchor="middle">Current: 3.9x</text>

  <rect x="544" y="608" width="240" height="56" rx="4" fill="#1F2E4D" stroke="#ED3694" stroke-width="1"/>
  <text x="664" y="632" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Team Engagement</text>
  <text x="664" y="652" fill="#6B7A8E" font-size="10" text-anchor="middle">Not currently measured</text>
</svg>