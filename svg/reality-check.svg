<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="56" fill="#1F2E4D" rx="8"/>
  <rect x="0" y="48" width="800" height="8" fill="#1F2E4D"/>
  <rect x="0" y="0" width="3" height="56" fill="#ED3694"/>
  <text x="24" y="36" fill="#ED3694" font-size="13" font-weight="bold" letter-spacing="2">THE TEST</text>
  <text x="120" y="36" fill="#FFFFFF" font-size="18" font-weight="bold">REALITY CHECK</text>

  <!-- Column headers -->
  <text x="200" y="86" fill="#7A7F8E" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1.2">THE STORY</text>
  <text x="540" y="86" fill="#7A7F8E" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1.2">THE EVIDENCE</text>
  <text x="740" y="86" fill="#7A7F8E" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1.2">RATING</text>

  <!-- Divider -->
  <line x1="40" y1="98" x2="760" y2="98" stroke="#2A3656" stroke-width="1"/>

  <!-- Row 1: Supported -->
  <rect x="40" y="108" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="131" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="156" fill="#FFFFFF" font-size="13">"We have strong product-market fit in</text>
  <text x="56" y="169" fill="#FFFFFF" font-size="13">the SMB segment"</text>

  <rect x="410" y="108" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="426" y="131" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="156" fill="#B8BCC8" font-size="12">NPS 62, 78% monthly retention,</text>
  <text x="426" y="169" fill="#B8BCC8" font-size="12">85% of revenue from SMB</text>

  <rect x="700" y="122" width="80" height="26" rx="6" fill="rgba(237,54,148,0.15)"/>
  <text x="740" y="140" fill="#ED3694" font-size="10" font-weight="bold" text-anchor="middle">SUPPORTED</text>

  <!-- Row 2: Partial -->
  <rect x="40" y="186" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="209" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="234" fill="#FFFFFF" font-size="13">"Growth is accelerating"</text>

  <rect x="410" y="186" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="426" y="209" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="234" fill="#B8BCC8" font-size="12">MRR up 8% MoM but churn rose</text>
  <text x="426" y="247" fill="#B8BCC8" font-size="12">from 4% to 7%. Net growth flat.</text>

  <rect x="700" y="200" width="80" height="26" rx="6" fill="rgba(237,54,148,0.1)"/>
  <text x="740" y="218" fill="#ED3694" font-size="10" font-weight="bold" text-anchor="middle" opacity="0.6">PARTIAL</text>

  <!-- Row 3: Unsupported -->
  <rect x="40" y="264" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="287" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="312" fill="#FFFFFF" font-size="13">"The team is strong and aligned"</text>

  <rect x="410" y="264" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="426" y="287" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="312" fill="#B8BCC8" font-size="12">No 1:1s in 3 months. 2 of 6 engineers</text>
  <text x="426" y="325" fill="#B8BCC8" font-size="12">actively interviewing elsewhere.</text>

  <rect x="700" y="278" width="80" height="26" rx="6" fill="rgba(237,54,148,0.06)"/>
  <text x="740" y="296" fill="#ED3694" font-size="10" font-weight="bold" text-anchor="middle" opacity="0.3">UNSUPPORTED</text>

  <!-- Row 4: Unsupported -->
  <rect x="40" y="342" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="365" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="390" fill="#FFFFFF" font-size="13">"We'll be profitable by Q3"</text>

  <rect x="410" y="342" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="426" y="365" fill="#7A7F8E" font-size="10" font-weight="bold" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="390" fill="#B8BCC8" font-size="12">Burn rate $85K/mo. Revenue $22K/mo.</text>
  <text x="426" y="403" fill="#B8BCC8" font-size="12">No model shows path to Q3 breakeven.</text>

  <rect x="700" y="356" width="80" height="26" rx="6" fill="rgba(237,54,148,0.06)"/>
  <text x="740" y="374" fill="#ED3694" font-size="10" font-weight="bold" text-anchor="middle" opacity="0.3">UNSUPPORTED</text>

  <!-- Divider -->
  <line x1="40" y1="426" x2="760" y2="426" stroke="#ED3694" stroke-width="2"/>

  <!-- Revised Narrative -->
  <text x="40" y="454" fill="#ED3694" font-size="11" font-weight="bold" letter-spacing="1.2">REVISED NARRATIVE</text>

  <rect x="40" y="466" width="720" height="80" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="491" fill="#FFFFFF" font-size="13">"We have genuine product-market fit in SMB, but growth is masking a churn</text>
  <text x="56" y="509" fill="#FFFFFF" font-size="13">problem. The team needs attention before we can scale. Profitability timeline</text>
  <text x="56" y="527" fill="#FFFFFF" font-size="13">needs a realistic reset based on current unit economics."</text>

  <!-- 3 Key Metrics -->
  <text x="40" y="576" fill="#ED3694" font-size="11" font-weight="bold" letter-spacing="1.2">3 KEY METRICS</text>

  <rect x="40" y="590" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="150" y="612" fill="#ED3694" font-size="12" font-weight="bold" text-anchor="middle">Net Revenue Retention</text>
  <text x="150" y="629" fill="#7A7F8E" font-size="10" text-anchor="middle">Target: &gt;100%</text>

  <rect x="280" y="590" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="390" y="612" fill="#ED3694" font-size="12" font-weight="bold" text-anchor="middle">Monthly Burn Multiple</text>
  <text x="390" y="629" fill="#7A7F8E" font-size="10" text-anchor="middle">Current: 3.9x</text>

  <rect x="520" y="590" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="630" y="612" fill="#ED3694" font-size="12" font-weight="bold" text-anchor="middle">Team Engagement Score</text>
  <text x="630" y="629" fill="#7A7F8E" font-size="10" text-anchor="middle">Not currently measured</text>
</svg>