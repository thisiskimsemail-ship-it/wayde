<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" fill="#1B2A4A" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" fill="#ED3694" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1.5">REALITY CHECK</text>

  <!-- Column headers -->
  <text x="200" y="70" fill="#8892A8" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1.2">THE STORY</text>
  <text x="540" y="70" fill="#8892A8" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1.2">THE EVIDENCE</text>
  <text x="740" y="70" fill="#8892A8" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1.2">RATING</text>

  <!-- Divider -->
  <line x1="40" y1="82" x2="760" y2="82" stroke="#2A3656" stroke-width="1"/>

  <!-- Row 1: Supported -->
  <rect x="40" y="92" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="115" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="140" fill="#FFFFFF" font-size="13">"We have strong product-market fit in</text>
  <text x="56" y="153" fill="#FFFFFF" font-size="13">the SMB segment"</text>

  <rect x="410" y="92" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#22C55E" stroke-width="1.5"/>
  <text x="426" y="115" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="140" fill="#C8D0DC" font-size="12">NPS 62, 78% monthly retention,</text>
  <text x="426" y="153" fill="#C8D0DC" font-size="12">85% of revenue from SMB</text>

  <rect x="700" y="106" width="80" height="26" rx="6" fill="rgba(34,197,94,0.15)"/>
  <text x="740" y="124" fill="#22C55E" font-size="10" font-weight="700" text-anchor="middle">SUPPORTED</text>

  <!-- Row 2: Partial -->
  <rect x="40" y="170" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="193" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="218" fill="#FFFFFF" font-size="13">"Growth is accelerating"</text>

  <rect x="410" y="170" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="426" y="193" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="218" fill="#C8D0DC" font-size="12">MRR up 8% MoM but churn rose</text>
  <text x="426" y="231" fill="#C8D0DC" font-size="12">from 4% to 7%. Net growth flat.</text>

  <rect x="700" y="184" width="80" height="26" rx="6" fill="rgba(245,158,11,0.15)"/>
  <text x="740" y="202" fill="#F59E0B" font-size="10" font-weight="700" text-anchor="middle">PARTIAL</text>

  <!-- Row 3: Unsupported -->
  <rect x="40" y="248" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="271" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="296" fill="#FFFFFF" font-size="13">"The team is strong and aligned"</text>

  <rect x="410" y="248" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#EF4444" stroke-width="1.5"/>
  <text x="426" y="271" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="296" fill="#C8D0DC" font-size="12">No 1:1s in 3 months. 2 of 6 engineers</text>
  <text x="426" y="309" fill="#C8D0DC" font-size="12">actively interviewing elsewhere.</text>

  <rect x="700" y="262" width="80" height="26" rx="6" fill="rgba(239,68,68,0.15)"/>
  <text x="740" y="280" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">UNSUPPORTED</text>

  <!-- Row 4: Unsupported -->
  <rect x="40" y="326" width="350" height="64" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="349" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">CLAIM</text>
  <text x="56" y="374" fill="#FFFFFF" font-size="13">"We'll be profitable by Q3"</text>

  <rect x="410" y="326" width="270" height="64" rx="8" fill="#1F2E4D" stroke="#EF4444" stroke-width="1.5"/>
  <text x="426" y="349" fill="#8892A8" font-size="10" font-weight="700" letter-spacing="0.8">EVIDENCE</text>
  <text x="426" y="374" fill="#C8D0DC" font-size="12">Burn rate $85K/mo. Revenue $22K/mo.</text>
  <text x="426" y="387" fill="#C8D0DC" font-size="12">No model shows path to Q3 breakeven.</text>

  <rect x="700" y="340" width="80" height="26" rx="6" fill="rgba(239,68,68,0.15)"/>
  <text x="740" y="358" fill="#EF4444" font-size="10" font-weight="700" text-anchor="middle">UNSUPPORTED</text>

  <!-- Divider -->
  <line x1="40" y1="410" x2="760" y2="410" stroke="#ED3694" stroke-width="2"/>

  <!-- Revised Narrative -->
  <text x="40" y="438" fill="#ED3694" font-size="11" font-weight="700" letter-spacing="1.2">REVISED NARRATIVE</text>

  <rect x="40" y="450" width="720" height="80" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="475" fill="#FFFFFF" font-size="13">"We have genuine product-market fit in SMB, but growth is masking a churn</text>
  <text x="56" y="493" fill="#FFFFFF" font-size="13">problem. The team needs attention before we can scale. Profitability timeline</text>
  <text x="56" y="511" fill="#FFFFFF" font-size="13">needs a realistic reset based on current unit economics."</text>

  <!-- 3 Key Metrics -->
  <text x="40" y="560" fill="#ED3694" font-size="11" font-weight="700" letter-spacing="1.2">3 KEY METRICS</text>

  <rect x="40" y="574" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="150" y="596" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Net Revenue Retention</text>
  <text x="150" y="613" fill="#8892A8" font-size="10" text-anchor="middle">Target: &gt;100%</text>

  <rect x="280" y="574" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="390" y="596" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Monthly Burn Multiple</text>
  <text x="390" y="613" fill="#8892A8" font-size="10" text-anchor="middle">Current: 3.9x</text>

  <rect x="520" y="574" width="220" height="50" rx="8" fill="#1F2E4D" stroke="#ED3694" stroke-width="1.5"/>
  <text x="630" y="596" fill="#ED3694" font-size="12" font-weight="700" text-anchor="middle">Team Engagement Score</text>
  <text x="630" y="613" fill="#8892A8" font-size="10" text-anchor="middle">Not currently measured</text>
</svg>
