<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#F15A22"/>
  <text x="16" y="26" fill="#F15A22" font-size="11" font-weight="600" letter-spacing="3">SPARK</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Constraint Flip</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Phase labels -->
  <text x="128" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">CONSTRAINT</text>
  <text x="400" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">THE FLIP</text>
  <text x="664" y="68" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">IDEAS</text>

  <!-- Constraint card -->
  <rect x="16" y="80" width="224" height="184" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <rect x="16" y="80" width="2" height="184" fill="#F15A22"/>
  <text x="40" y="104" fill="#F15A22" font-size="11" font-weight="600" letter-spacing="2">THE LIMITATION</text>
  <text x="40" y="132" fill="#FFFFFF" font-size="13" font-weight="700">Two-person team</text>
  <text x="40" y="156" fill="#FFFFFF" font-size="13" font-weight="700">No funding</text>
  <text x="40" y="180" fill="#FFFFFF" font-size="13" font-weight="700">Competing vs VC-backed</text>
  <text x="40" y="200" fill="#FFFFFF" font-size="13" font-weight="700">platforms</text>
  <text x="40" y="232" fill="#6B7A8E" font-size="11" font-style="italic">"We can't outbuild them."</text>

  <!-- Arrow -->
  <line x1="248" y1="172" x2="280" y2="172" stroke="#F15A22" stroke-width="1.5"/>
  <polygon points="276,167 288,172 276,177" fill="#F15A22"/>

  <!-- Flip card -->
  <rect x="296" y="80" width="208" height="184" fill="#1F2E4D" rx="4" stroke="#F15A22" stroke-width="1.5"/>
  <text x="320" y="104" fill="#F15A22" font-size="11" font-weight="600" letter-spacing="2">REFRAMED AS ADVANTAGE</text>
  <text x="320" y="136" fill="#FFFFFF" font-size="13" font-weight="700">Can't outbuild —</text>
  <text x="320" y="156" fill="#FFFFFF" font-size="13" font-weight="700">but can outcare.</text>
  <text x="320" y="188" fill="#C8CED8" font-size="11">Every customer talks to</text>
  <text x="320" y="208" fill="#C8CED8" font-size="11">a founder. Decisions in</text>
  <text x="320" y="228" fill="#C8CED8" font-size="11">hours, not quarters.</text>

  <!-- Arrow to ideas -->
  <line x1="512" y1="172" x2="536" y2="172" stroke="#F15A22" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Idea cards -->
  <rect x="544" y="80" width="240" height="56" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="104" fill="#FFFFFF" font-size="12" font-weight="700">Concierge-first model</text>
  <text x="568" y="124" fill="#6B7A8E" font-size="10">Hand-hold every customer personally.</text>

  <rect x="544" y="144" width="240" height="56" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="168" fill="#FFFFFF" font-size="12" font-weight="700">Founder-led onboarding</text>
  <text x="568" y="188" fill="#6B7A8E" font-size="10">CEO does every onboarding call.</text>

  <rect x="544" y="208" width="240" height="56" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="232" fill="#FFFFFF" font-size="12" font-weight="700">Community not features</text>
  <text x="568" y="252" fill="#6B7A8E" font-size="10">Build users, not a feature roadmap.</text>

  <rect x="544" y="272" width="240" height="56" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="296" fill="#FFFFFF" font-size="12" font-weight="700">Opinionated defaults</text>
  <text x="568" y="316" fill="#6B7A8E" font-size="10">Fewer features, each one exactly right.</text>

  <!-- Separator -->
  <line x1="16" y1="352" x2="784" y2="352" stroke="#2A3656" stroke-width="1"/>

  <!-- Moat Idea label -->
  <text x="400" y="384" fill="#6B7A8E" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">THE MOAT IDEA</text>

  <!-- Moat card -->
  <rect x="112" y="400" width="576" height="128" fill="#1F2E4D" rx="4" stroke="#F15A22" stroke-width="1.5"/>
  <text x="136" y="432" fill="#FFFFFF" font-size="16" font-weight="700">Concierge-first where the product IS the relationship.</text>
  <text x="136" y="464" fill="#C8CED8" font-size="12">A VC-backed competitor can't copy this without dismantling their</text>
  <text x="136" y="484" fill="#C8CED8" font-size="12">scale model. The constraint (small team) becomes the moat.</text>
  <text x="192" y="516" fill="#F15A22" font-size="10" font-weight="600" text-anchor="middle">HARD TO COPY</text>
  <text x="376" y="516" fill="#F15A22" font-size="10" font-weight="600" text-anchor="middle">DEPENDS ON CONSTRAINT</text>

  <!-- First test -->
  <rect x="16" y="552" width="768" height="56" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="580" fill="#F15A22" font-size="11" font-weight="600" letter-spacing="2">FIRST TEST</text>
  <text x="136" y="580" fill="#FFFFFF" font-size="12">Offer concierge onboarding to next 10 signups. Measure retention vs self-serve cohort.</text>
</svg>