<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: Arial, sans-serif; }</style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7A7F8E"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E4E517"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="56" fill="#1F2E4D" rx="8"/>
  <rect x="0" y="48" width="800" height="8" fill="#1F2E4D"/>
  <rect x="0" y="0" width="3" height="56" fill="#E4E517"/>
  <text x="24" y="36" fill="#E4E517" font-size="13" font-weight="bold" letter-spacing="2">THE BUILD</text>
  <text x="130" y="36" fill="#FFFFFF" font-size="18" font-weight="bold">THEORY OF CHANGE</text>

  <!-- Subtitle -->
  <text x="400" y="82" text-anchor="middle" font-size="11" fill="#7A7F8E">Education Platform Impact Chain</text>

  <!-- Direction labels -->
  <text x="110" y="106" text-anchor="middle" font-size="10" fill="#7A7F8E">PRECONDITIONS</text>
  <text x="200" y="106" text-anchor="middle" font-size="12" fill="#7A7F8E">&#x2190;</text>
  <text x="400" y="106" text-anchor="middle" font-size="10" fill="#7A7F8E">ACTIVITIES</text>
  <text x="600" y="106" text-anchor="middle" font-size="12" fill="#7A7F8E">&#x2192;</text>
  <text x="690" y="106" text-anchor="middle" font-size="10" fill="#7A7F8E">OUTCOME</text>
  <line x1="170" y1="102" x2="630" y2="102" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- OUTCOME (right side, largest card) -->
  <rect x="590" y="196" width="190" height="120" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="2"/>
  <text x="685" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#E4E517" letter-spacing="1.5">OUTCOME</text>
  <text x="685" y="240" text-anchor="middle" font-size="11" fill="#FFFFFF">Teachers spend 30% less</text>
  <text x="685" y="256" text-anchor="middle" font-size="11" fill="#FFFFFF">time on admin, 30% more</text>
  <text x="685" y="272" text-anchor="middle" font-size="11" fill="#FFFFFF">on instruction</text>
  <text x="685" y="300" text-anchor="middle" font-size="9" fill="#7A7F8E">5-year target</text>

  <!-- Precondition 4: Regulatory body (OUTSIDE CONTROL — yellow 0.3 opacity) -->
  <rect x="410" y="136" width="155" height="80" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="487" y="158" text-anchor="middle" font-size="9" font-weight="bold" fill="#E4E517" letter-spacing="1" opacity="0.3">OUTSIDE CONTROL</text>
  <text x="487" y="176" text-anchor="middle" font-size="10" fill="#FFFFFF">Regulatory body updates</text>
  <text x="487" y="190" text-anchor="middle" font-size="10" fill="#FFFFFF">accreditation requirements</text>
  <circle cx="420" cy="141" r="4" fill="#E4E517" opacity="0.3"/>

  <!-- Precondition 3: Admin grants time (OUTSIDE CONTROL — yellow 0.3 opacity) -->
  <rect x="410" y="296" width="155" height="80" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="487" y="318" text-anchor="middle" font-size="9" font-weight="bold" fill="#E4E517" letter-spacing="1" opacity="0.3">OUTSIDE CONTROL</text>
  <text x="487" y="336" text-anchor="middle" font-size="10" fill="#FFFFFF">Admin grants time for</text>
  <text x="487" y="350" text-anchor="middle" font-size="10" fill="#FFFFFF">professional development</text>
  <circle cx="420" cy="301" r="4" fill="#E4E517" opacity="0.3"/>

  <!-- Precondition 2: Teachers trained (WITHIN CONTROL — yellow full opacity) -->
  <rect x="220" y="216" width="155" height="80" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5"/>
  <text x="297" y="238" text-anchor="middle" font-size="9" font-weight="bold" fill="#E4E517" letter-spacing="1">WITHIN CONTROL</text>
  <text x="297" y="256" text-anchor="middle" font-size="10" fill="#FFFFFF">Teachers trained and</text>
  <text x="297" y="270" text-anchor="middle" font-size="10" fill="#FFFFFF">confident using platform</text>
  <circle cx="230" cy="221" r="4" fill="#E4E517"/>

  <!-- Precondition 1: Platform adopted (WITHIN CONTROL — yellow full opacity) -->
  <rect x="220" y="336" width="155" height="80" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5"/>
  <text x="297" y="358" text-anchor="middle" font-size="9" font-weight="bold" fill="#E4E517" letter-spacing="1">WITHIN CONTROL</text>
  <text x="297" y="376" text-anchor="middle" font-size="10" fill="#FFFFFF">Platform adopted by</text>
  <text x="297" y="390" text-anchor="middle" font-size="10" fill="#FFFFFF">pilot schools</text>
  <circle cx="230" cy="341" r="4" fill="#E4E517"/>

  <!-- ACTIVITIES (far left) -->
  <rect x="20" y="166" width="165" height="55" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="102" y="186" text-anchor="middle" font-size="9" font-weight="bold" fill="#7A7F8E" letter-spacing="1">ACTIVITY</text>
  <text x="102" y="204" text-anchor="middle" font-size="10" fill="#FFFFFF">Create training programme</text>

  <rect x="20" y="241" width="165" height="55" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="102" y="261" text-anchor="middle" font-size="9" font-weight="bold" fill="#7A7F8E" letter-spacing="1">ACTIVITY</text>
  <text x="102" y="279" text-anchor="middle" font-size="10" fill="#FFFFFF">Run teacher workshops</text>

  <rect x="20" y="326" width="165" height="55" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="102" y="346" text-anchor="middle" font-size="9" font-weight="bold" fill="#7A7F8E" letter-spacing="1">ACTIVITY</text>
  <text x="102" y="364" text-anchor="middle" font-size="10" fill="#FFFFFF">Build platform</text>

  <rect x="20" y="401" width="165" height="55" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="102" y="421" text-anchor="middle" font-size="9" font-weight="bold" fill="#7A7F8E" letter-spacing="1">ACTIVITY</text>
  <text x="102" y="439" text-anchor="middle" font-size="10" fill="#FFFFFF">Recruit pilot schools</text>

  <!-- ARROWS: Activities to Preconditions -->
  <line x1="185" y1="193" x2="218" y2="241" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="268" x2="218" y2="256" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="356" x2="218" y2="366" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="428" x2="218" y2="391" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ARROWS: Preconditions to downstream -->
  <line x1="375" y1="246" x2="408" y2="191" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="376" x2="408" y2="336" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="266" x2="408" y2="316" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ARROWS: Preconditions to Outcome -->
  <line x1="565" y1="176" x2="588" y2="226" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="565" y1="336" x2="588" y2="286" stroke="#7A7F8E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SPHERE LEGEND -->
  <rect x="20" y="486" width="760" height="40" rx="8" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <circle cx="60" cy="506" r="6" fill="#E4E517"/>
  <text x="74" y="510" font-size="10" fill="#FFFFFF">Within Control</text>
  <circle cx="210" cy="506" r="6" fill="#E4E517" opacity="0.6"/>
  <text x="224" y="510" font-size="10" fill="#FFFFFF">Within Influence</text>
  <circle cx="370" cy="506" r="6" fill="#E4E517" opacity="0.3"/>
  <text x="384" y="510" font-size="10" fill="#FFFFFF">Outside Control</text>
  <rect x="520" y="498" width="16" height="16" rx="3" fill="none" stroke="#E4E517" stroke-width="1.5"/>
  <text x="544" y="510" font-size="10" fill="#FFFFFF">Outcome</text>
  <rect x="620" y="498" width="16" height="16" rx="3" fill="none" stroke="#2A3656" stroke-width="1.5"/>
  <text x="644" y="510" font-size="10" fill="#FFFFFF">Activity</text>

  <!-- WEAKEST LINK CALLOUT -->
  <rect x="20" y="556" width="760" height="65" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="578" font-size="10" font-weight="bold" fill="#E4E517" letter-spacing="1.5">WEAKEST LINK</text>
  <text x="40" y="598" font-size="12" fill="#FFFFFF">"Admin grants time for professional development" — outside your control, blocks the entire chain</text>

  <!-- TEST ACTION BOX -->
  <rect x="20" y="641" width="760" height="40" rx="8" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5"/>
  <text x="40" y="665" font-size="10" font-weight="bold" fill="#E4E517" letter-spacing="1.5">TEST</text>
  <text x="80" y="665" font-size="12" fill="#FFFFFF">Interview 5 school administrators this month to validate willingness to allocate PD time</text>
</svg>