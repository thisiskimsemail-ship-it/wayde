<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
    <marker id="toc-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#E4E517"/>
  <text x="16" y="26" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="3">BUILD</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Theory of Change</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="400" y="68" text-anchor="middle" font-size="11" fill="#6B7A8E">Education Platform Impact Chain</text>

  <!-- Direction labels -->
  <text x="104" y="92" text-anchor="middle" font-size="10" fill="#6B7A8E" letter-spacing="1">ACTIVITIES</text>
  <text x="304" y="92" text-anchor="middle" font-size="10" fill="#6B7A8E" letter-spacing="1">PRECONDITIONS</text>
  <text x="688" y="92" text-anchor="middle" font-size="10" fill="#6B7A8E" letter-spacing="1">OUTCOME</text>

  <!-- ACTIVITIES (left) -->
  <rect x="16" y="112" width="176" height="48" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="104" y="132" text-anchor="middle" font-size="10" fill="#6B7A8E" font-weight="600">ACTIVITY</text>
  <text x="104" y="148" text-anchor="middle" font-size="11" fill="#FFFFFF">Create training programme</text>

  <rect x="16" y="176" width="176" height="48" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="104" y="196" text-anchor="middle" font-size="10" fill="#6B7A8E" font-weight="600">ACTIVITY</text>
  <text x="104" y="212" text-anchor="middle" font-size="11" fill="#FFFFFF">Run teacher workshops</text>

  <rect x="16" y="264" width="176" height="48" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="104" y="284" text-anchor="middle" font-size="10" fill="#6B7A8E" font-weight="600">ACTIVITY</text>
  <text x="104" y="300" text-anchor="middle" font-size="11" fill="#FFFFFF">Build platform</text>

  <rect x="16" y="328" width="176" height="48" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="104" y="348" text-anchor="middle" font-size="10" fill="#6B7A8E" font-weight="600">ACTIVITY</text>
  <text x="104" y="364" text-anchor="middle" font-size="11" fill="#FFFFFF">Recruit pilot schools</text>

  <!-- PRECONDITIONS (within control) -->
  <rect x="224" y="152" width="168" height="72" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1"/>
  <text x="308" y="172" text-anchor="middle" font-size="10" fill="#E4E517" font-weight="600" letter-spacing="1">WITHIN CONTROL</text>
  <text x="308" y="192" text-anchor="middle" font-size="11" fill="#FFFFFF">Teachers trained and</text>
  <text x="308" y="208" text-anchor="middle" font-size="11" fill="#FFFFFF">confident using platform</text>

  <rect x="224" y="280" width="168" height="72" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1"/>
  <text x="308" y="300" text-anchor="middle" font-size="10" fill="#E4E517" font-weight="600" letter-spacing="1">WITHIN CONTROL</text>
  <text x="308" y="320" text-anchor="middle" font-size="11" fill="#FFFFFF">Platform adopted by</text>
  <text x="308" y="336" text-anchor="middle" font-size="11" fill="#FFFFFF">pilot schools</text>

  <!-- PRECONDITIONS (outside control) -->
  <rect x="424" y="112" width="168" height="72" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1" stroke-opacity="0.3"/>
  <text x="508" y="132" text-anchor="middle" font-size="10" fill="#E4E517" font-weight="600" letter-spacing="1" opacity="0.3">OUTSIDE CONTROL</text>
  <text x="508" y="152" text-anchor="middle" font-size="11" fill="#FFFFFF">Regulatory body updates</text>
  <text x="508" y="168" text-anchor="middle" font-size="11" fill="#FFFFFF">accreditation requirements</text>

  <rect x="424" y="248" width="168" height="72" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1" stroke-opacity="0.3"/>
  <text x="508" y="268" text-anchor="middle" font-size="10" fill="#E4E517" font-weight="600" letter-spacing="1" opacity="0.3">OUTSIDE CONTROL</text>
  <text x="508" y="288" text-anchor="middle" font-size="11" fill="#FFFFFF">Admin grants time for</text>
  <text x="508" y="304" text-anchor="middle" font-size="11" fill="#FFFFFF">professional development</text>

  <!-- OUTCOME -->
  <rect x="600" y="168" width="184" height="112" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1.5"/>
  <text x="692" y="192" text-anchor="middle" font-size="10" fill="#E4E517" font-weight="600" letter-spacing="1">OUTCOME</text>
  <text x="692" y="216" text-anchor="middle" font-size="11" fill="#FFFFFF">Teachers spend 30% less</text>
  <text x="692" y="232" text-anchor="middle" font-size="11" fill="#FFFFFF">time on admin, 30% more</text>
  <text x="692" y="248" text-anchor="middle" font-size="11" fill="#FFFFFF">on instruction</text>
  <text x="692" y="268" text-anchor="middle" font-size="10" fill="#6B7A8E">5-year target</text>

  <!-- Arrows: Activities to Preconditions -->
  <line x1="192" y1="136" x2="222" y2="172" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="192" y1="200" x2="222" y2="192" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="192" y1="288" x2="222" y2="304" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="192" y1="352" x2="222" y2="328" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>

  <!-- Arrows: Preconditions to downstream -->
  <line x1="392" y1="180" x2="422" y2="152" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="392" y1="200" x2="422" y2="268" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="392" y1="316" x2="422" y2="284" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>

  <!-- Arrows: Preconditions to Outcome -->
  <line x1="592" y1="148" x2="598" y2="200" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>
  <line x1="592" y1="284" x2="598" y2="252" stroke="#6B7A8E" stroke-width="1" marker-end="url(#toc-arrow)"/>

  <!-- Legend -->
  <rect x="16" y="408" width="768" height="40" rx="4" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <circle cx="48" cy="428" r="4" fill="#E4E517"/>
  <text x="60" y="432" font-size="10" fill="#C8CED8">Within Control</text>
  <circle cx="184" cy="428" r="4" fill="#E4E517" opacity="0.3"/>
  <text x="196" y="432" font-size="10" fill="#C8CED8">Outside Control</text>
  <rect x="320" y="422" width="12" height="12" rx="2" fill="none" stroke="#E4E517" stroke-width="1"/>
  <text x="340" y="432" font-size="10" fill="#C8CED8">Outcome</text>
  <rect x="416" y="422" width="12" height="12" rx="2" fill="none" stroke="#2A3656" stroke-width="1"/>
  <text x="436" y="432" font-size="10" fill="#C8CED8">Activity</text>

  <!-- Weakest Link -->
  <rect x="16" y="464" width="768" height="64" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="40" y="488" font-size="11" font-weight="600" fill="#E4E517" letter-spacing="2">WEAKEST LINK</text>
  <text x="40" y="512" font-size="12" fill="#FFFFFF">"Admin grants time for professional development" — outside your control, blocks the entire chain.</text>

  <!-- Test -->
  <rect x="16" y="544" width="768" height="48" rx="4" fill="#1F2E4D" stroke="#E4E517" stroke-width="1"/>
  <text x="40" y="572" font-size="11" font-weight="600" fill="#E4E517" letter-spacing="2">TEST</text>
  <text x="80" y="572" font-size="12" fill="#FFFFFF">Interview 5 school administrators this month to validate willingness to allocate PD time.</text>
</svg>