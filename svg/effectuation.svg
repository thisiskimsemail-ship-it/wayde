<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="2" height="40" fill="#E4E517"/>
  <text x="16" y="26" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="3">BUILD</text>
  <text x="784" y="26" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end">Effectuation</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#2A3656" stroke-width="1"/>

  <!-- Row 1: Three means columns -->
  <!-- WHO I AM -->
  <rect x="16" y="56" width="248" height="232" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="80" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">WHO I AM</text>
  <text x="40" y="100" fill="#6B7A8E" font-size="11">Identity, values, traits</text>
  <line x1="32" y1="112" x2="248" y2="112" stroke="#2A3656" stroke-width="0.5"/>
  <text x="40" y="136" fill="#C8CED8" font-size="12">Resilient problem-solver</text>
  <text x="40" y="160" fill="#C8CED8" font-size="12">Strong communicator</text>
  <text x="40" y="184" fill="#C8CED8" font-size="12">Comfortable with ambiguity</text>
  <text x="40" y="208" fill="#C8CED8" font-size="12">Value collaboration over control</text>

  <!-- WHAT I KNOW -->
  <rect x="280" y="56" width="248" height="232" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="304" y="80" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">WHAT I KNOW</text>
  <text x="304" y="100" fill="#6B7A8E" font-size="11">Skills, expertise, education</text>
  <line x1="296" y1="112" x2="512" y2="112" stroke="#2A3656" stroke-width="0.5"/>
  <text x="304" y="136" fill="#C8CED8" font-size="12">Product management (8 years)</text>
  <text x="304" y="160" fill="#C8CED8" font-size="12">Data analytics and user research</text>
  <text x="304" y="184" fill="#C8CED8" font-size="12">EdTech domain expertise</text>
  <text x="304" y="208" fill="#C8CED8" font-size="12">MBA from Melbourne Business School</text>

  <!-- WHO I KNOW -->
  <rect x="544" y="56" width="240" height="232" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="80" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">WHO I KNOW</text>
  <text x="568" y="100" fill="#6B7A8E" font-size="11">Network, contacts, community</text>
  <line x1="560" y1="112" x2="768" y2="112" stroke="#2A3656" stroke-width="0.5"/>
  <text x="568" y="136" fill="#C8CED8" font-size="12">3 potential co-founders in tech</text>
  <text x="568" y="160" fill="#C8CED8" font-size="12">Wade Institute alumni network</text>
  <text x="568" y="184" fill="#C8CED8" font-size="12">Former colleagues at 2 SaaS cos</text>
  <text x="568" y="208" fill="#C8CED8" font-size="12">Angel investor from past startup</text>

  <!-- Row 2: Three principles -->
  <!-- Affordable Loss -->
  <rect x="16" y="304" width="248" height="136" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="40" y="328" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">AFFORDABLE LOSS</text>
  <text x="40" y="348" fill="#6B7A8E" font-size="10">What can you risk without catastrophe?</text>
  <line x1="32" y1="360" x2="248" y2="360" stroke="#2A3656" stroke-width="0.5"/>
  <text x="40" y="384" fill="#C8CED8" font-size="12">6 months of savings ($30K)</text>
  <text x="40" y="408" fill="#C8CED8" font-size="12">Evenings + weekends before quitting</text>
  <text x="40" y="432" fill="#C8CED8" font-size="12">Reputation risk: low (supportive network)</text>

  <!-- Crazy Quilt -->
  <rect x="280" y="304" width="248" height="136" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="304" y="328" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">CRAZY QUILT</text>
  <text x="304" y="348" fill="#6B7A8E" font-size="10">Who could become a partner or co-creator?</text>
  <line x1="296" y1="360" x2="512" y2="360" stroke="#2A3656" stroke-width="0.5"/>
  <text x="304" y="384" fill="#C8CED8" font-size="12">Ex-colleague with engineering skills</text>
  <text x="304" y="408" fill="#C8CED8" font-size="12">University partner for pilot program</text>
  <text x="304" y="432" fill="#C8CED8" font-size="12">Early customer willing to co-design</text>

  <!-- Lemonade -->
  <rect x="544" y="304" width="240" height="136" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <text x="568" y="328" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">LEMONADE</text>
  <text x="568" y="348" fill="#6B7A8E" font-size="10">What surprises could you leverage?</text>
  <line x1="560" y1="360" x2="768" y2="360" stroke="#2A3656" stroke-width="0.5"/>
  <text x="568" y="384" fill="#C8CED8" font-size="12">AI tools making MVPs faster to build</text>
  <text x="568" y="408" fill="#C8CED8" font-size="12">Remote work normalised async collab</text>
  <text x="568" y="432" fill="#C8CED8" font-size="12">Competitor just shut down (market gap)</text>

  <!-- Arrow -->
  <line x1="400" y1="448" x2="400" y2="480" stroke="#E4E517" stroke-width="1.5"/>
  <polygon points="394,476 400,488 406,476" fill="#E4E517"/>

  <!-- First Move -->
  <rect x="16" y="496" width="768" height="120" fill="#1F2E4D" rx="4" stroke="#2A3656" stroke-width="1"/>
  <rect x="16" y="496" width="768" height="2" fill="#E4E517"/>
  <text x="40" y="528" fill="#E4E517" font-size="11" font-weight="600" letter-spacing="2">FIRST MOVE — NEXT 48 HOURS</text>
  <text x="40" y="560" fill="#FFFFFF" font-size="14" font-weight="700">Call 3 people from my network who match the early adopter profile and ask:</text>
  <text x="40" y="588" fill="#FFFFFF" font-size="14" font-weight="700">"What's the most frustrating part of onboarding new users to your product?"</text>
</svg>