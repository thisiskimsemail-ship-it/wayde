<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .accent-bar { fill: #E4E517; }
      .bg-main { fill: #1B2A4A; }
      .bg-card { fill: #1F2E4D; }
      .bg-inner { fill: #253658; }
      .border-main { stroke: #2A3656; stroke-width: 1; }
      .border-emphasis { stroke: #E4E517; stroke-width: 1.5; }
      .text-white { fill: #FFFFFF; font-family: Inter, Helvetica Neue, Arial, sans-serif; }
      .text-body { fill: #C8CED8; font-family: Inter, Helvetica Neue, Arial, sans-serif; font-size: 12px; }
      .text-muted { fill: #6B7A8E; font-family: Inter, Helvetica Neue, Arial, sans-serif; font-size: 10px; }
      .text-label { fill: #E4E517; font-family: Inter, Helvetica Neue, Arial, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; }
      .text-category { fill: #E4E517; font-family: Inter, Helvetica Neue, Arial, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
      .text-title { fill: #FFFFFF; font-family: Inter, Helvetica Neue, Arial, sans-serif; font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" class="bg-main"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" class="accent-bar"/>

  <!-- Header background -->
  <rect x="0" y="4" width="800" height="44" class="bg-main"/>
  <!-- Wade Institute wordmark -->
  <image x="10" y="5" width="90" height="39" href="data:image/png;base64," preserveAspectRatio="xMinYMid meet"/><!-- Tool name -->
  <text x="784" y="30" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end" font-family="Inter, Helvetica Neue, Arial, sans-serif">EFFECTUATION</text>
  <path d="M 26 22 L 32 26 L 38 22 M 26 30 L 32 26 L 38 30" fill="none" stroke="#E4E517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Header divider -->
  <line x1="0" y1="48" x2="800" y2="48" class="border-main"/>

  <!-- Content starts at y=64 -->
  <!-- 2x2 Grid layout for effectuation quadrants -->

  <!-- BIRD IN HAND - Top Left (y: 64-230) -->
  <rect x="16" y="64" width="368" height="166" rx="6" class="bg-card border-main"/>
  <rect x="16" y="64" width="368" height="24" rx="6" fill="#E4E517"/>
  <text x="26" y="80" class="text-category">BIRD IN HAND</text>
  <text x="26" y="100" fill="#C8CED8" font-size="11" data-zone="eff-means" opacity="0"></text>
  <line x1="26" y1="160" x2="368" y2="160" class="border-main"/>
  <text x="26" y="176" class="text-label">What do I have?</text>

  <!-- AFFORDABLE LOSS - Top Right (y: 64-230) -->
  <rect x="416" y="64" width="368" height="166" rx="6" class="bg-card border-main"/>
  <rect x="416" y="64" width="368" height="24" rx="6" fill="#E4E517"/>
  <text x="426" y="80" class="text-category">AFFORDABLE LOSS</text>
  <text x="426" y="100" fill="#C8CED8" font-size="11" data-zone="eff-loss" opacity="0"></text>
  <line x1="426" y1="160" x2="768" y2="160" class="border-main"/>
  <text x="426" y="176" class="text-label">What can I risk?</text>

  <!-- LEMONADE - Bottom Left (y: 248-414) -->
  <rect x="16" y="248" width="368" height="166" rx="6" class="bg-card border-main"/>
  <rect x="16" y="248" width="368" height="24" rx="6" fill="#E4E517"/>
  <text x="26" y="264" class="text-category">LEMONADE</text>
  <text x="26" y="284" fill="#C8CED8" font-size="11" data-zone="eff-lemonade" opacity="0"></text>
  <line x1="26" y1="344" x2="368" y2="344" class="border-main"/>
  <text x="26" y="360" class="text-label">What surprises can I use?</text>

  <!-- PATCHWORK QUILT - Bottom Right (y: 248-414) -->
  <rect x="416" y="248" width="368" height="166" rx="6" class="bg-card border-main"/>
  <rect x="416" y="248" width="368" height="24" rx="6" fill="#E4E517"/>
  <text x="426" y="264" class="text-category">PATCHWORK QUILT</text>
  <text x="426" y="284" fill="#C8CED8" font-size="11" data-zone="eff-quilt" opacity="0"></text>
  <line x1="426" y1="344" x2="768" y2="344" class="border-main"/>
  <text x="426" y="360" class="text-label">Who's in?</text>

  <!-- NEXT MOVE - Full width (y: 430-530) -->
  <rect x="16" y="430" width="768" height="100" rx="6" class="bg-card border-main"/>
  <rect x="16" y="430" width="768" height="24" rx="6" fill="#E4E517"/>
  <text x="26" y="446" class="text-category">NEXT MOVE</text>
  <text x="26" y="470" fill="#C8CED8" font-size="11" data-zone="eff-action" opacity="0"></text>


  <!-- Footer -->
  <rect x="0" y="672" width="800" height="28" fill="#151E35"/>
  <text x="400" y="690" fill="#6B7A8E" font-size="9" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Created in collaboration with Wade Institute of Entrepreneurship</text>
</svg>