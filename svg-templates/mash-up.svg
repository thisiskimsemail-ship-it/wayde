<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="900" fill="#1B2A4A"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="#F15A22"/>

  <!-- Header area -->
  <rect x="0" y="4" width="800" height="44" fill="#1B2A4A"/>
  <text x="784" y="30" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end" font-family="Inter, Helvetica Neue, Arial, sans-serif">MASH UP</text>
  <line x1="0" y1="48" x2="800" y2="48" stroke="#2A3656" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- BAND 1: Problem + Abstract Structure (top)  -->
  <!-- ============================================ -->

  <text x="40" y="74" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="2" font-family="Inter, Helvetica Neue, Arial, sans-serif">ANCHORS</text>

  <!-- Problem card -->
  <rect x="40" y="86" width="350" height="100" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="56" y="106" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="1.5" font-family="Inter, Helvetica Neue, Arial, sans-serif">PROBLEM</text>
  <text data-zone="mu-problem" x="56" y="126" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Waiting for content...</tspan>
  </text>

  <!-- Abstract Structure card -->
  <rect x="410" y="86" width="350" height="100" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text x="426" y="106" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="1.5" font-family="Inter, Helvetica Neue, Arial, sans-serif">ABSTRACT STRUCTURE</text>
  <text data-zone="mu-abstract" x="426" y="126" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="426" dy="0">Waiting for content...</tspan>
  </text>

  <!-- Divider -->
  <line x1="40" y1="206" x2="760" y2="206" stroke="#2A3656" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- BAND 2: Collision Cards (middle)            -->
  <!-- ============================================ -->

  <text x="40" y="228" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="2" font-family="Inter, Helvetica Neue, Arial, sans-serif">COLLISIONS</text>

  <!-- Collision 1 -->
  <rect x="40" y="240" width="720" height="80" rx="6" fill="#1F2E4D" stroke="#F15A22" stroke-width="1" stroke-opacity="0.3"/>
  <text data-zone="mu-collision-1" x="56" y="265" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Collision 1</tspan>
  </text>

  <!-- Collision 2 -->
  <rect x="40" y="330" width="720" height="80" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text data-zone="mu-collision-2" x="56" y="355" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Collision 2</tspan>
  </text>

  <!-- Collision 3 -->
  <rect x="40" y="420" width="720" height="80" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text data-zone="mu-collision-3" x="56" y="445" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Collision 3</tspan>
  </text>

  <!-- Collision 4 -->
  <rect x="40" y="510" width="720" height="80" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text data-zone="mu-collision-4" x="56" y="535" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Collision 4</tspan>
  </text>

  <!-- Divider -->
  <line x1="40" y1="610" x2="760" y2="610" stroke="#F15A22" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- BAND 3: Remixed Ideas + Actions (bottom)    -->
  <!-- ============================================ -->

  <text x="40" y="634" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="2" font-family="Inter, Helvetica Neue, Arial, sans-serif">REMIXED IDEAS</text>

  <!-- Remix 1 -->
  <rect x="40" y="646" width="720" height="70" rx="6" fill="#1F2E4D" stroke="#2A3656" stroke-width="1"/>
  <text data-zone="mu-remix" x="56" y="671" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">Remixed ideas will appear here...</tspan>
  </text>

  <!-- Actions -->
  <rect x="40" y="730" width="720" height="70" rx="6" fill="#1F2E4D" stroke="#F15A22" stroke-width="1" stroke-opacity="0.5"/>
  <text x="56" y="750" fill="#F15A22" font-size="10" font-weight="600" letter-spacing="1.5" font-family="Inter, Helvetica Neue, Arial, sans-serif">ACTIONS</text>
  <text data-zone="mu-actions" x="56" y="770" fill="#FFFFFF" font-size="13" font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <tspan x="56" dy="0">First experiment to run...</tspan>
  </text>

  <!-- Footer -->
  <line x1="0" y1="820" x2="800" y2="820" stroke="#2A3656" stroke-width="1"/>
  <text x="400" y="845" fill="#6B7A99" font-size="10" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Wade Institute of Entrepreneurship &bull; The Studio</text>
  <rect x="0" y="896" width="800" height="4" fill="#F15A22"/>
</svg>
