<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="#ED3694"/>
  <rect x="0" y="4" width="800" height="44" fill="#1B2A4A"/>
  <!-- Wade Institute wordmark -->
  <image x="10" y="5" width="90" height="39" href="data:image/png;base64," preserveAspectRatio="xMinYMid meet"/><!-- Tool name -->
  <text x="784" y="30" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end" font-family="Inter, Helvetica Neue, Arial, sans-serif">TRADE-OFF</text>

  <!-- Header divider -->
  <line x1="0" y1="48" x2="800" y2="48" stroke="#2A3656" stroke-width="1"/>

  <!-- Decision Statement -->
  <text x="32" y="75" fill="#ED3694" font-size="11" font-weight="600" letter-spacing="2" font-family="Inter, Helvetica Neue, Arial, sans-serif">DECISION</text>
  <text x="32" y="95" fill="#C8CED8" font-size="11" data-zone="to-features" opacity="0"></text>

  <!-- 4 Option Cards -->
  <!-- Card 1: AI Onboarding -->
  <rect x="32" y="115" width="170" height="110" fill="#1F2E4D" stroke="#2A3656" stroke-width="1" rx="6"/>
  <rect x="32" y="115" width="170" height="3" fill="#ED3694" rx="6"/>
  <text x="48" y="135" fill="#ED3694" font-size="10" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">OPTION 1</text>

  <!-- Card 2: Self-serve Analytics -->
  <rect x="222" y="115" width="170" height="110" fill="#1F2E4D" stroke="#2A3656" stroke-width="1" rx="6"/>
  <rect x="222" y="115" width="170" height="3" fill="#ED3694" rx="6"/>
  <text x="238" y="135" fill="#ED3694" font-size="10" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">OPTION 2</text>

  <!-- Card 3: API for Integrations -->
  <rect x="412" y="115" width="170" height="110" fill="#253658" stroke="#ED3694" stroke-width="1.5" rx="6"/>
  <rect x="412" y="115" width="170" height="3" fill="#ED3694" rx="6"/>
  <text x="428" y="135" fill="#ED3694" font-size="10" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">OPTION 3 (WINNER)</text>

  <!-- Card 4: Mobile App -->
  <rect x="602" y="115" width="170" height="110" fill="#1F2E4D" stroke="#2A3656" stroke-width="1" rx="6"/>
  <rect x="602" y="115" width="170" height="3" fill="#ED3694" rx="6"/>
  <text x="618" y="135" fill="#ED3694" font-size="10" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">OPTION 4</text>

  <!-- 2x2 Matrix -->
  <!-- Matrix frame -->
  <rect x="60" y="260" width="380" height="200" fill="none" stroke="#2A3656" stroke-width="1"/>

  <!-- Axis lines -->
  <line x1="250" y1="260" x2="250" y2="460" stroke="#2A3656" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="60" y1="360" x2="440" y2="360" stroke="#2A3656" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Axis labels -->
  <text x="245" y="250" fill="#6B7A8E" font-size="9" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">IMPACT</text>
  <text x="50" y="355" fill="#6B7A8E" font-size="9" font-weight="600" letter-spacing="1" font-family="Inter, Helvetica Neue, Arial, sans-serif">EFFORT</text>

  <!-- Quadrant labels -->
  <text x="160" y="278" fill="#6B7A8E" font-size="9" font-style="italic" font-family="Inter, Helvetica Neue, Arial, sans-serif">Low Impact</text>
  <text x="280" y="278" fill="#6B7A8E" font-size="9" font-style="italic" font-family="Inter, Helvetica Neue, Arial, sans-serif">High Impact</text>
  <text x="65" y="450" fill="#6B7A8E" font-size="9" font-style="italic" font-family="Inter, Helvetica Neue, Arial, sans-serif">High Effort</text>
  <text x="65" y="272" fill="#6B7A8E" font-size="9" font-style="italic" font-family="Inter, Helvetica Neue, Arial, sans-serif">Low Effort</text>

  <!-- Plot data points -->
  <!-- AI Onboarding (High/High) - top left -->
  <circle cx="150" cy="310" r="6" fill="none" stroke="#ED3694" stroke-width="2"/>
  <text x="150" y="340" fill="#ED3694" font-size="9" font-weight="600" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">AI</text>

  <!-- Self-serve Analytics (Medium/Medium) - center -->
  <circle cx="250" cy="360" r="6" fill="none" stroke="#72D96D" stroke-width="2"/>
  <text x="250" y="390" fill="#72D96D" font-size="9" font-weight="600" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Analytics</text>

  <!-- API for Integrations (High/Medium) - top right, highlighted -->
  <circle cx="350" cy="330" r="7" fill="none" stroke="#ED3694" stroke-width="2.5"/>
  <circle cx="350" cy="330" r="11" fill="none" stroke="#ED3694" stroke-width="1.5"/>
  <text x="350" y="360" fill="#ED3694" font-size="9" font-weight="600" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">API</text>

  <!-- Mobile App (Low/High) - bottom right -->
  <circle cx="380" cy="420" r="6" fill="none" stroke="#C8CED8" stroke-width="2"/>
  <text x="380" y="450" fill="#C8CED8" font-size="9" font-weight="600" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Mobile</text>

  <!-- DECISION box -->
  <rect x="32" y="495" width="736" height="165" fill="#1F2E4D" stroke="#2A3656" stroke-width="1" rx="6"/>
  <rect x="32" y="495" width="736" height="3" fill="#ED3694" rx="6"/>

  <text x="48" y="520" fill="#ED3694" font-size="10" font-weight="600" letter-spacing="2" font-family="Inter, Helvetica Neue, Arial, sans-serif">DECISION</text>
  <text x="48" y="545" fill="#C8CED8" font-size="11" data-zone="to-mvo" opacity="0"></text>



  <text x="48" y="620" fill="#ED3694" font-size="11" font-weight="600" font-family="Inter, Helvetica Neue, Arial, sans-serif">Owner: Engineering Lead | Timeline: Q2 2026 | Budget: $40K</text>

  <!-- Footer -->
  <rect x="0" y="672" width="800" height="28" fill="#151E35"/>
  <text x="400" y="690" fill="#6B7A8E" font-size="9" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Created in collaboration with Wade Institute of Entrepreneurship</text>
</svg>
