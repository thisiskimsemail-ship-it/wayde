<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Inter, Helvetica Neue, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#1B2A4A"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="#27BDBE"/>
  <rect x="0" y="4" width="800" height="44" fill="#1B2A4A"/>
  <!-- Wade Institute wordmark -->
  <image x="10" y="5" width="90" height="39" href="data:image/png;base64," preserveAspectRatio="xMinYMid meet"/><!-- Tool name -->
  <text x="784" y="30" fill="#FFFFFF" font-size="16" font-weight="700" text-anchor="end" font-family="Inter, Helvetica Neue, Arial, sans-serif">Five Whys</text>
  <line x1="0" y1="48" x2="800" y2="48" stroke="#2A3656" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="24" y="60" width="752" height="72" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <text x="48" y="82" fill="#27BDBE" font-size="14" font-weight="700">1</text>
  <text x="72" y="82" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2">WHY</text>
  <text x="72" y="108" fill="#C8CED8" font-size="12">Why are customers cancelling after the first month?</text>
  <line x1="48" y1="132" x2="48" y2="148" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 2 -->
  <rect x="24" y="148" width="752" height="72" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <text x="48" y="170" fill="#27BDBE" font-size="14" font-weight="700">2</text>
  <text x="72" y="170" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2">WHY</text>
  <text x="72" y="196" fill="#C8CED8" font-size="12">They don't see value in the product quickly enough.</text>
  <line x1="48" y1="220" x2="48" y2="236" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 3 -->
  <rect x="24" y="236" width="752" height="72" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <text x="48" y="258" fill="#27BDBE" font-size="14" font-weight="700">3</text>
  <text x="72" y="258" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2">WHY</text>
  <text x="72" y="284" fill="#C8CED8" font-size="12">Onboarding doesn't connect features to their specific goals.</text>
  <line x1="48" y1="308" x2="48" y2="324" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 4 -->
  <rect x="24" y="324" width="752" height="72" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <text x="48" y="346" fill="#27BDBE" font-size="14" font-weight="700">4</text>
  <text x="72" y="346" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2">WHY</text>
  <text x="72" y="372" fill="#C8CED8" font-size="12">We use one-size-fits-all onboarding for every segment.</text>
  <line x1="48" y1="396" x2="48" y2="412" stroke="#2A3656" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 5 -->
  <rect x="24" y="412" width="752" height="72" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <text x="48" y="434" fill="#27BDBE" font-size="14" font-weight="700">5</text>
  <text x="72" y="434" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2">WHY</text>
  <text x="72" y="460" fill="#C8CED8" font-size="12">We never researched how different segments define success.</text>

  <!-- Arrow to root cause -->
  <line x1="400" y1="492" x2="400" y2="528" stroke="#27BDBE" stroke-width="1.5"/>
  <polygon points="394,524 400,536 406,524" fill="#27BDBE"/>

  <!-- Root Cause box -->
  <rect x="24" y="544" width="752" height="96" fill="#1F2E4D" rx="6" stroke="#2A3656" stroke-width="1"/>
  <rect x="24" y="544" width="752" height="2" fill="#27BDBE"/>
  <text x="400" y="572" fill="#27BDBE" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle">ROOT CAUSE</text>
  <text x="400" y="600" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">We lack segment-specific understanding of what "value" means</text>
  <text x="400" y="620" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">to each customer type.</text>

  <!-- Footer -->
  <rect x="0" y="672" width="800" height="28" fill="#151E35"/>
  <text x="400" y="690" fill="#6B7A8E" font-size="9" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif">Created in collaboration with Wade Institute of Entrepreneurship</text>
</svg>
